model:
  name: VectorFieldMLP
  input_dim: 3
  output_dim: 3
  hidden_dim: 64
  num_layers: 3
  activation: tanh
  dropout: 0.0

training:
  epochs: 3
  batch_size: 64
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0
  scheduler: null
  early_stopping_patience: 5
  val_split: 0.1
  test_split: 0.1
  seed: 42